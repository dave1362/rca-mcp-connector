name: Publish to PyPI

# Build + validate on every push; the actual upload only runs when a
# v* tag is pushed. Uses PyPI Trusted Publishing (OIDC) -- no long-lived
# API token/secret to manage or leak; PyPI trusts this exact repo +
# workflow file + environment combination directly. One-time setup
# required on PyPI's side (Project -> Manage -> Publishing) before the
# first tag push after this workflow lands -- see the connector repo's
# README or ask for the exact steps.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install build tooling
        run: pip install build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Validate package metadata
        run: twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for OIDC trusted publishing
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
